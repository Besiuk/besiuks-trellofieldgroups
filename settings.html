<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1d2125;
    color: #b6c2cf;
    font-size: 13px;
  }

  /* ── Layout ── */
  #app { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

  /* ── Top bar ── */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2px;
  }
  .topbar-title { font-size: 11px; font-weight: 700; color: #7a8ea0; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── Buttons ── */
  .btn {
    padding: 5px 11px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    border: none;
    transition: background 0.15s;
  }
  .btn-primary { background: #4c9ce0; color: #fff; }
  .btn-primary:hover { background: #3a8ad4; }
  .btn-ghost { background: transparent; color: #7a8ea0; border: 1px solid #2f3f4f; }
  .btn-ghost:hover { background: #2f3f4f; color: #b6c2cf; }
  .btn-danger { background: transparent; color: #f87462; border: 1px solid #f87462; }
  .btn-danger:hover { background: #f87462; color: #fff; }
  .btn-icon { background: transparent; border: none; color: #7a8ea0; cursor: pointer; font-size: 15px; padding: 2px 6px; border-radius: 3px; font-family: inherit; }
  .btn-icon:hover { background: #2f3f4f; color: #b6c2cf; }
  .btn-sm { padding: 3px 8px; font-size: 11px; }

  /* ── Drag & Drop ── */
  .drag-handle {
    font-size: 16px; color: #3d5166; cursor: grab; flex-shrink: 0;
    padding: 0 4px; user-select: none; line-height: 1;
  }
  .drag-handle:hover { color: #7a8ea0; }
  .drag-handle:active { cursor: grabbing; }
  .field-drag-handle {
    font-size: 13px; color: #3d5166; cursor: grab; flex-shrink: 0;
    padding: 0 3px; user-select: none; line-height: 1;
  }
  .field-drag-handle:hover { color: #7a8ea0; }
  .field-drag-handle:active { cursor: grabbing; }
  .eye-toggle {
    background: transparent; border: none; cursor: pointer;
    font-size: 14px; padding: 0 3px; flex-shrink: 0; line-height: 1;
    transition: opacity 0.15s;
  }
  .eye-toggle.off { opacity: 0.25; }
  .eye-toggle.off:hover { opacity: 0.5; }
  .eye-toggle.on  { opacity: 1; color: #4c9ce0; }
  .group-card.dragging  { opacity: 0.4; }
  .group-card.drag-over { border-color: #4c9ce0; box-shadow: 0 -2px 0 #4c9ce0; }
  .field-row.dragging   { opacity: 0.4; }
  .field-row.drag-over  { border-color: #4c9ce0; box-shadow: 0 -2px 0 #4c9ce0; }

  /* ── Group card ── */
  .group-card {
    background: #22303c;
    border: 1px solid #2f3f4f;
    border-radius: 6px;
    overflow: hidden;
  }
  .group-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    cursor: pointer;
    user-select: none;
  }
  .group-header:hover { background: #263645; }
  .chevron { font-size: 10px; color: #7a8ea0; flex-shrink: 0; transition: transform 0.15s; }
  .chevron.open { transform: rotate(90deg); }
  .group-name-input {
    flex: 1;
    background: transparent;
    border: none;
    color: #b6c2cf;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: text;
    min-width: 0;
  }
  .group-name-input:focus { outline: none; }
  .group-name-input::placeholder { color: #3d5166; font-weight: 400; text-transform: none; letter-spacing: 0; }
  .group-meta { font-size: 11px; color: #3d5166; flex-shrink: 0; }

  /* ── Group body ── */
  .group-body { padding: 0 12px 12px; border-top: 1px solid #2f3f4f; display: none; }
  .group-body.open { display: block; }

  /* ── Section heading ── */
  .section-head {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #7a8ea0;
    text-transform: uppercase;
    margin: 14px 0 8px;
  }

  /* ── Label chips ── */
  .label-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .label-chip {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 9px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid transparent;
    opacity: 0.5;
    transition: opacity 0.15s, border-color 0.15s;
    user-select: none;
  }
  .label-chip.selected { opacity: 1; border-color: rgba(255,255,255,0.5); }
  .label-chip .check { font-size: 10px; }

  /* ── Fields table ── */
  .fields-list { display: flex; flex-direction: column; gap: 6px; }

  .field-row {
    background: #1a2730;
    border: 1px solid #2f3f4f;
    border-radius: 5px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .field-row-top {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .field-label-input {
    flex: 1;
    background: #22303c;
    border: 1px solid #2f3f4f;
    border-radius: 4px;
    color: #b6c2cf;
    padding: 5px 8px;
    font-size: 12px;
    font-family: inherit;
    min-width: 0;
  }
  .field-label-input:focus { outline: none; border-color: #4c9ce0; }
  .field-label-input::placeholder { color: #3d5166; }

  .field-select {
    background: #22303c;
    border: 1px solid #2f3f4f;
    border-radius: 4px;
    color: #b6c2cf;
    padding: 5px 7px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
  }
  .field-select:focus { outline: none; border-color: #4c9ce0; }

  /* ── Options sub-section ── */
  .options-section { padding-top: 4px; }
  .options-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 6px; }
  .option-row { display: flex; gap: 5px; align-items: center; }
  .option-input {
    flex: 1;
    background: #22303c;
    border: 1px solid #2f3f4f;
    border-radius: 4px;
    color: #b6c2cf;
    padding: 4px 8px;
    font-size: 12px;
    font-family: inherit;
  }
  .option-input:focus { outline: none; border-color: #4c9ce0; }

  /* ── Color swatch + picker ── */
  .color-swatch {
    width: 18px; height: 18px; border-radius: 50%; cursor: pointer; flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.15); transition: border-color 0.15s;
  }
  .color-swatch:hover { border-color: rgba(255,255,255,0.5); }
  .color-picker {
    display: flex; flex-wrap: wrap; gap: 5px; padding: 8px;
    background: #1a2730; border: 1px solid #2f3f4f; border-radius: 6px;
    margin: 2px 0 4px 23px; width: fit-content;
  }
  .color-dot {
    width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: border-color 0.1s, transform 0.1s;
  }
  .color-dot:hover { border-color: rgba(255,255,255,0.7); transform: scale(1.15); }
  .color-dot.active { border-color: white; }

  /* ── Empty states ── */
  .empty { color: #3d5166; font-size: 12px; padding: 8px 0; text-align: center; }

  /* ── Divider ── */
  .divider { border: none; border-top: 1px solid #2f3f4f; margin: 14px 0 2px; }

  /* ── Saving indicator ── */
  .saving-dot { display: inline-block; width: 6px; height: 6px; background: #4c9ce0; border-radius: 50%; margin-left: 6px; opacity: 0; transition: opacity 0.2s; }
  .saving-dot.visible { opacity: 1; }
</style>
</head>
<body>
<div id="app"><div class="empty" style="padding:24px 0">Loading…</div></div>

<script src="https://p.trellocdn.com/power-up.min.js"></script>
<script>
var t = TrelloPowerUp.iframe();

/* ── state ── */
var groups           = [];
var boardLabels      = [];
var expanded         = null;
var colorPickerOpen  = null;
var draggedGid       = null;
var draggedFid       = null;
var draggedFid_gid   = null;
var saveTimer        = null;

/* ── color palette ── */
var PALETTE = [
  '#ef5350','#e91e63','#9c27b0','#673ab7',
  '#3f51b5','#4c9ce0','#00bcd4','#009688',
  '#4caf50','#8bc34a','#f9a825','#fb8c00',
  '#ff5722','#795548','#546e7a','#b6c2cf'
];

/* ── Trello label color map → CSS background ── */
var COLOR_MAP = {
  green:'#4bce97', yellow:'#f5cd47', orange:'#fea362', red:'#f87462',
  purple:'#9f8fef', blue:'#579dff', sky:'#6cc3e0', lime:'#94c748',
  pink:'#e774bb', black:'#626f86',
  green_dark:'#1f845a', yellow_dark:'#946f00', orange_dark:'#c25100',
  red_dark:'#c9372c', purple_dark:'#6e5dc6', blue_dark:'#0055cc',
  sky_dark:'#206a83', lime_dark:'#5b7f24', pink_dark:'#ae4787', black_dark:'#44546f',
  green_light:'#baf3db', yellow_light:'#f8e6a0', orange_light:'#fedec8',
  red_light:'#ffd5d2', purple_light:'#dfd8fd', blue_light:'#cce0ff',
  sky_light:'#c6edfb', lime_light:'#d3f1a7', pink_light:'#fdd0ec', black_light:'#dcdfe4'
};
function labelBg(color) { return COLOR_MAP[color] || '#7a8ea0'; }
function labelFg(color) {
  var light = ['green_light','yellow_light','orange_light','red_light','purple_light',
               'blue_light','sky_light','lime_light','pink_light','black_light',
               'green','yellow','lime','sky'];
  return light.indexOf(color) !== -1 ? '#1d2125' : '#ffffff';
}

/* ── uid ── */
function uid() { return Math.random().toString(36).slice(2,9) + Date.now().toString(36); }

/* ── html escape ── */
function h(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── debounced save ── */
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    t.set('board', 'shared', 'fieldGroups', groups);
  }, 600);
}

/* ── render ── */
function render() {
  var html = '<div id="app">';

  // Top bar
  html += '<div class="topbar">';
  html += '<span class="topbar-title">Field Groups</span>';
  html += '<button class="btn btn-primary btn-sm" id="btn-new-group">+ New Group</button>';
  html += '</div>';

  if (groups.length === 0) {
    html += '<div class="empty" style="padding:20px 0">No groups yet.<br>Create one and link it to a label.</div>';
  }

  groups.forEach(function(g) {
    var isOpen  = expanded === g.id;
    var lblCount = (g.labelIds||[]).length;
    var fldCount = (g.fields||[]).length;
    var meta = [];
    if (lblCount) meta.push(lblCount + ' label' + (lblCount !== 1 ? 's' : ''));
    if (fldCount) meta.push(fldCount + ' field' + (fldCount !== 1 ? 's' : ''));

    html += '<div class="group-card" data-gid="'+h(g.id)+'" draggable="true">';

    // Header
    html += '<div class="group-header">';
    html += '<span class="drag-handle" title="Drag to reorder">⠿</span>';
    html += '<span class="chevron'+(isOpen?' open':'')+'">▶</span>';
    html += '<input class="group-name-input" type="text" data-gid="'+h(g.id)+'" placeholder="Group name…" value="'+h(g.name)+'">';
    if (meta.length) html += '<span class="group-meta">'+meta.join(' · ')+'</span>';
    html += '<button class="btn-icon" data-action="delete-group" data-gid="'+h(g.id)+'" title="Delete group">✕</button>';
    html += '</div>'; // group-header

    // Body (collapsed/expanded)
    html += '<div class="group-body'+(isOpen?' open':'')+'">';
    if (isOpen) html += renderGroupBody(g);
    html += '</div>';

    html += '</div>'; // group-card
  });

  html += '</div>'; // #app
  document.body.innerHTML = html;
  bind();
  t.sizeTo('body').catch(function(){});
}

function renderGroupBody(g) {
  var html = '';

  // ── Labels
  html += '<div class="section-head">Visible when card has label</div>';
  if (boardLabels.length === 0) {
    html += '<div class="empty">No labels on this board yet.</div>';
  } else {
    html += '<div class="label-chips">';
    boardLabels.forEach(function(lbl) {
      var sel = (g.labelIds||[]).indexOf(lbl.id) !== -1;
      var bg  = labelBg(lbl.color);
      var fg  = labelFg(lbl.color);
      var name = lbl.name || '(no name)';
      html += '<div class="label-chip'+(sel?' selected':'')+'" '
        +'style="background:'+bg+';color:'+fg+'" '
        +'data-action="toggle-label" data-gid="'+h(g.id)+'" data-lid="'+h(lbl.id)+'">'
        +(sel ? '<span class="check">✓</span>' : '')
        +h(name)
        +'</div>';
    });
    html += '</div>';
  }

  // ── Fields
  html += '<div class="section-head">Fields</div>';
  html += '<div class="fields-list" data-gid="'+h(g.id)+'">';

  if (!g.fields || g.fields.length === 0) {
    html += '<div class="empty" style="font-size:11px">No fields yet.</div>';
  } else {
    g.fields.forEach(function(f) {
      html += renderFieldRow(g.id, f);
    });
  }

  html += '</div>'; // fields-list

  html += '<div style="margin-top:8px">';
  html += '<button class="btn btn-ghost btn-sm" data-action="add-field" data-gid="'+h(g.id)+'">+ Add Field</button>';
  html += '</div>';

  // Delete group footer
  html += '<hr class="divider">';
  html += '<button class="btn btn-danger btn-sm" data-action="delete-group" data-gid="'+h(g.id)+'">Delete Group</button>';

  return html;
}

function renderFieldRow(gid, f) {
  var hasOptions = f.type === 'dropdown' || f.type === 'checkboxes' || f.type === 'select';
  var showColor  = f.type === 'dropdown' || f.type === 'select';
  var html = '<div class="field-row" data-fid="'+h(f.id)+'" data-gid="'+h(gid)+'" draggable="true">';
  html += '<div class="field-row-top">';

  // Drag handle
  html += '<span class="field-drag-handle" title="Drag to reorder">⠿</span>';

  // Label name
  html += '<input class="field-label-input" type="text" placeholder="Field name…" '
    +'data-action="field-name" data-gid="'+h(gid)+'" data-fid="'+h(f.id)+'" '
    +'value="'+h(f.label)+'" style="flex:2">';

  // Type
  html += '<select class="field-select" data-action="field-type" data-gid="'+h(gid)+'" data-fid="'+h(f.id)+'">'
    +opt('text','Text',f.type)
    +opt('number','Number',f.type)
    +opt('checkbox','Checkbox',f.type)
    +opt('checkboxes','Checkboxes',f.type)
    +opt('dropdown','Dropdown (Buttons)',f.type)
    +opt('select','Dropdown (Classic)',f.type)
    +opt('heading','— Heading —',f.type)
    +opt('divider','— Divider —',f.type)
    +'</select>';

  // Width
  html += '<select class="field-select" data-action="field-width" data-gid="'+h(gid)+'" data-fid="'+h(f.id)+'">'
    +opt('full','Full',f.width)
    +opt('4/5','4/5',f.width)
    +opt('3/4','3/4',f.width)
    +opt('3/5','3/5',f.width)
    +opt('1/2','1/2',f.width)
    +opt('2/5','2/5',f.width)
    +opt('2/3','2/3',f.width)
    +opt('1/3','1/3',f.width)
    +opt('1/4','1/4',f.width)
    +opt('1/5','1/5',f.width)
    +'</select>';

  // Delete + eye toggle
  html += '<button class="btn-icon" data-action="delete-field" data-gid="'+h(gid)+'" data-fid="'+h(f.id)+'" title="Remove">✕</button>';
  if (f.type !== 'heading' && f.type !== 'divider') {
    var eyeOn = f.showOnCard ? ' on' : ' off';
    html += '<button class="eye-toggle'+eyeOn+'" data-action="toggle-show-on-card" '
      +'data-gid="'+h(gid)+'" data-fid="'+h(f.id)+'" title="Show on card preview">👁</button>';
  }

  html += '</div>'; // field-row-top

  // Checkbox single: optional display label
  if (f.type === 'checkbox') {
    html += '<div style="display:flex;gap:6px;align-items:center;padding-top:2px">';
    html += '<span style="font-size:11px;color:#7a8ea0;flex-shrink:0">Check label:</span>';
    html += '<input class="field-label-input" type="text" placeholder="e.g. Enabled" '
      +'data-action="field-checklabel" data-gid="'+h(gid)+'" data-fid="'+h(f.id)+'" '
      +'value="'+h(f.checkLabel||'')+'">'; 
    html += '</div>';
  }

  // Hint for heading / divider
  if (f.type === 'heading') {
    html += '<div style="font-size:11px;color:#7a8ea0;padding-top:3px">↑ Text displayed as centered section heading</div>';
  }
  if (f.type === 'divider') {
    html += '<div style="font-size:11px;color:#7a8ea0;padding-top:3px">↑ Name is optional — renders as a horizontal line</div>';
  }

  // Options for dropdown / checkboxes / select
  if (hasOptions) {
    html += '<div class="options-section">';
    html += '<div style="font-size:10px;color:#7a8ea0;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px">Options</div>';
    html += '<div class="options-list">';
    var colors = f.optionColors || {};
    (f.options || []).forEach(function(op, oi) {
      var pickerKey    = gid+'|'+f.id+'|'+oi;
      var isPickerOpen = colorPickerOpen === pickerKey;
      var currentColor = colors[op] || '#4c9ce0';
      html += '<div>';
      html += '<div class="option-row">';
      if (showColor) {
        html += '<div class="color-swatch" style="background:'+currentColor+'" '
          +'data-action="toggle-color-picker" data-gid="'+h(gid)+'" data-fid="'+h(f.id)+'" data-oi="'+oi+'"></div>';
      }
      html += '<input class="option-input" type="text" placeholder="Option…" '
          +'data-action="option-text" data-gid="'+h(gid)+'" data-fid="'+h(f.id)+'" data-oi="'+oi+'" '
          +'value="'+h(op)+'">'
        +'<button class="btn-icon" data-action="delete-option" data-gid="'+h(gid)+'" data-fid="'+h(f.id)+'" data-oi="'+oi+'">✕</button>';
      html += '</div>';
      if (showColor && isPickerOpen) {
        html += '<div class="color-picker">';
        PALETTE.forEach(function(c) {
          var active = c === currentColor ? ' active' : '';
          html += '<div class="color-dot'+active+'" style="background:'+c+'" '
            +'data-action="pick-color" data-gid="'+h(gid)+'" data-fid="'+h(f.id)+'" data-oi="'+oi+'" data-color="'+c+'"></div>';
        });
        html += '</div>';
      }
      html += '</div>';
    });
    html += '</div>'; // options-list
    html += '<button class="btn btn-ghost btn-sm" data-action="add-option" data-gid="'+h(gid)+'" data-fid="'+h(f.id)+'">+ Add Option</button>';
    html += '</div>'; // options-section
  }

  html += '</div>'; // field-row
  return html;
}

function opt(value, label, current) {
  return '<option value="'+h(value)+'"'+(current===value?' selected':'')+'>'+h(label)+'</option>';
}

/* ── event binding ── */
function bind() {
  var app = document.getElementById('app');
  if (!app) return;

  // New group
  var btnNew = document.getElementById('btn-new-group');
  if (btnNew) btnNew.addEventListener('click', function() {
    var g = { id: uid(), name: '', labelIds: [], fields: [] };
    groups.push(g);
    expanded = g.id;
    save();
    render();
  });

  // Delegated events
  app.addEventListener('click', function(e) {
    var el = e.target.closest('[data-action]');
    if (!el) return;
    var action = el.dataset.action;
    var gid    = el.dataset.gid;
    var fid    = el.dataset.fid;
    var lid    = el.dataset.lid;

    if (action === 'delete-group') {
      if (!confirm('Delete this group?')) return;
      groups = groups.filter(function(g){ return g.id !== gid; });
      if (expanded === gid) expanded = null;
      save(); render();

    } else if (action === 'toggle-label') {
      var g = findGroup(gid);
      if (!g) return;
      var idx = g.labelIds.indexOf(lid);
      if (idx === -1) g.labelIds.push(lid);
      else g.labelIds.splice(idx, 1);
      save(); render();

    } else if (action === 'add-field') {
      var g = findGroup(gid);
      if (!g) return;
      g.fields.push({ id: uid(), label: '', type: 'text', width: 'full', options: [] });
      save(); render();

    } else if (action === 'delete-field') {
      var g = findGroup(gid);
      if (!g) return;
      g.fields = g.fields.filter(function(f){ return f.id !== fid; });
      save(); render();

    } else if (action === 'toggle-show-on-card') {
      var f = findField(gid, fid);
      if (!f) return;
      f.showOnCard = !f.showOnCard;
      save(); render();

    } else if (action === 'add-option') {
      var f = findField(gid, fid);
      if (!f) return;
      if (!f.options) f.options = [];
      f.options.push('');
      save(); render();

    } else if (action === 'delete-option') {
      var f = findField(gid, fid);
      if (!f) return;
      var oi = parseInt(el.dataset.oi);
      var optText = f.options[oi];
      f.options.splice(oi, 1);
      if (f.optionColors && f.optionColors[optText]) delete f.optionColors[optText];
      save(); render();

    } else if (action === 'toggle-color-picker') {
      var key = gid+'|'+fid+'|'+el.dataset.oi;
      colorPickerOpen = colorPickerOpen === key ? null : key;
      render();

    } else if (action === 'pick-color') {
      var f = findField(gid, fid);
      if (!f) return;
      var oi    = parseInt(el.dataset.oi);
      var color = el.dataset.color;
      if (!f.optionColors) f.optionColors = {};
      f.optionColors[f.options[oi]] = color;
      colorPickerOpen = null;
      save(); render();
    }
  });

  // Group header toggle (expand/collapse) — click on header but not on input or buttons
  app.querySelectorAll('.group-header').forEach(function(hdr) {
    hdr.addEventListener('click', function(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
      if (e.target.classList.contains('drag-handle')) return;
      if (e.target.classList.contains('field-drag-handle')) return;
      var gid = this.closest('.group-card').dataset.gid;
      expanded = expanded === gid ? null : gid;
      render();
    });
  });

  // Group name inputs
  app.querySelectorAll('.group-name-input').forEach(function(el) {
    el.addEventListener('input', function() {
      var g = findGroup(this.dataset.gid);
      if (g) { g.name = this.value; save(); }
    });
    el.addEventListener('click', function(e){ e.stopPropagation(); });
  });

  // Field name
  app.querySelectorAll('[data-action="field-name"]').forEach(function(el) {
    el.addEventListener('input', function() {
      var f = findField(this.dataset.gid, this.dataset.fid);
      if (f) { f.label = this.value; save(); }
    });
  });

  // Field type
  app.querySelectorAll('[data-action="field-type"]').forEach(function(el) {
    el.addEventListener('change', function() {
      var f = findField(this.dataset.gid, this.dataset.fid);
      if (!f) return;
      f.type = this.value;
      if ((f.type === 'dropdown' || f.type === 'checkboxes' || f.type === 'select') && !f.options) f.options = [];
      save(); render();
    });
  });

  // Field width
  app.querySelectorAll('[data-action="field-width"]').forEach(function(el) {
    el.addEventListener('change', function() {
      var f = findField(this.dataset.gid, this.dataset.fid);
      if (f) { f.width = this.value; save(); }
    });
  });

  // Field check label
  app.querySelectorAll('[data-action="field-checklabel"]').forEach(function(el) {
    el.addEventListener('input', function() {
      var f = findField(this.dataset.gid, this.dataset.fid);
      if (f) { f.checkLabel = this.value; save(); }
    });
  });

  // Option text
  app.querySelectorAll('[data-action="option-text"]').forEach(function(el) {
    el.addEventListener('input', function() {
      var f      = findField(this.dataset.gid, this.dataset.fid);
      var oi     = parseInt(this.dataset.oi);
      if (f && f.options) {
        var oldText = f.options[oi];
        var newText = this.value;
        if (f.optionColors && f.optionColors[oldText] !== undefined) {
          f.optionColors[newText] = f.optionColors[oldText];
          delete f.optionColors[oldText];
        }
        f.options[oi] = newText;
        save();
      }
    });
  });

  // ── Drag & Drop field reordering ──
  app.querySelectorAll('.field-row').forEach(function(row) {
    row.addEventListener('dragstart', function(e) {
      draggedFid     = this.dataset.fid;
      draggedFid_gid = this.dataset.gid;
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.stopPropagation();
    });
    row.addEventListener('dragend', function() {
      this.classList.remove('dragging');
      app.querySelectorAll('.field-row').forEach(function(r){ r.classList.remove('drag-over'); });
      draggedFid = null; draggedFid_gid = null;
    });
    row.addEventListener('dragover', function(e) {
      if (!draggedFid) return;
      e.preventDefault(); e.stopPropagation();
      if (this.dataset.fid === draggedFid) return;
      app.querySelectorAll('.field-row').forEach(function(r){ r.classList.remove('drag-over'); });
      this.classList.add('drag-over');
    });
    row.addEventListener('dragleave', function(){ this.classList.remove('drag-over'); });
    row.addEventListener('drop', function(e) {
      e.preventDefault(); e.stopPropagation();
      this.classList.remove('drag-over');
      var targetFid = this.dataset.fid;
      var targetGid = this.dataset.gid;
      if (!draggedFid || draggedFid === targetFid) return;
      var g = findGroup(draggedFid_gid);
      if (!g) return;
      var fromIdx = g.fields.findIndex(function(f){ return f.id === draggedFid; });
      var toIdx   = g.fields.findIndex(function(f){ return f.id === targetFid; });
      if (fromIdx === -1 || toIdx === -1) return;
      var moved = g.fields.splice(fromIdx, 1)[0];
      g.fields.splice(toIdx, 0, moved);
      save(); render();
    });
  });

  // ── Drag & Drop group reordering ──
  app.querySelectorAll('.group-card').forEach(function(card) {
    card.addEventListener('dragstart', function(e) {
      draggedGid = this.dataset.gid;
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', function() {
      this.classList.remove('dragging');
      app.querySelectorAll('.group-card').forEach(function(c){ c.classList.remove('drag-over'); });
      draggedGid = null;
    });
    card.addEventListener('dragover', function(e) {
      e.preventDefault();
      if (this.dataset.gid === draggedGid) return;
      app.querySelectorAll('.group-card').forEach(function(c){ c.classList.remove('drag-over'); });
      this.classList.add('drag-over');
    });
    card.addEventListener('dragleave', function(){ this.classList.remove('drag-over'); });
    card.addEventListener('drop', function(e) {
      e.preventDefault();
      this.classList.remove('drag-over');
      var targetGid = this.dataset.gid;
      if (!draggedGid || draggedGid === targetGid) return;
      var fromIdx = groups.findIndex(function(g){ return g.id === draggedGid; });
      var toIdx   = groups.findIndex(function(g){ return g.id === targetGid; });
      if (fromIdx === -1 || toIdx === -1) return;
      var moved = groups.splice(fromIdx, 1)[0];
      groups.splice(toIdx, 0, moved);
      save(); render();
    });
  });

  t.sizeTo('body').catch(function(){});
}

/* ── helpers ── */
function findGroup(gid) { return groups.find(function(g){ return g.id === gid; }); }
function findField(gid, fid) {
  var g = findGroup(gid);
  return g ? (g.fields||[]).find(function(f){ return f.id === fid; }) : null;
}

/* ── init ── */
Promise.all([
  t.get('board', 'shared', 'fieldGroups', []),
  t.board('labels')
]).then(function(res) {
  groups      = res[0] || [];
  boardLabels = (res[1] && res[1].labels) ? res[1].labels : [];
  render();
}).catch(function(err) {
  document.body.innerHTML = '<div style="padding:16px;color:#f87462">Error loading data: '+err+'</div>';
});
</script>
</body>
</html>

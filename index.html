<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script src="https://p.trellocdn.com/power-up.min.js"></script>
<script>
TrelloPowerUp.initialize({

  'card-back-section': function(t) {
    return {
      title: 'Fields',
      icon: 'https://besiuk.github.io/besiuks-trellofieldgroups/icon.png',
      content: {
        type: 'iframe',
        url: t.signUrl('./card-back.html'),
        height: 200
      }
    };
  },

  'board-buttons': function(t) {
    return [{
      text: 'Field Groups',
      callback: function(t) {
        return t.modal({
          title: 'Field Groups',
          url: t.signUrl('./settings.html'),
          height: 600,
          width: 700
        });
      }
    }];
  }

});
</script>
</body>
</html>
